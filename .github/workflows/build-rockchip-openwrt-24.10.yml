name: Build OpenWrt Firmware

on:
  push:
    branches:
      - main  # Adjust to your main branch or target branch
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Cache Docker layers
      uses: actions/cache@v2
      with:
        path: /tmp/.buildx-cache
        key: ${{ runner.os }}-buildx-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-buildx-

    - name: Build OpenWrt firmware
      run: |
        docker run --rm -v $PWD:/home/build openwrt/imagebuilder:23.05.5 /bin/bash -c "
          cd /home/build && \
          make image PROFILE=<your-target-profile> PACKAGES='<your-packages>' FILES=<path-to-files-directory> "
