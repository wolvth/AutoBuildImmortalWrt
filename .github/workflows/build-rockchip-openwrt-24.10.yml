name: 构建 OpenWrt 固件 (NanoPi R4S)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: 拉取 OpenWrt ImageBuilder 镜像
        run: docker pull openwrt/imagebuilder:rockchip-armv8-24.10.0-rc5

      - name: 构建 OpenWrt 固件
        run: |
          docker run --rm -v ${PWD}:/build \
            openwrt/imagebuilder:rockchip-armv8-24.10.0-rc5 \
            make image PROFILE="friendlyarm_nanopi-r4s" PACKAGES="luci"

      - name: 列出构建产物
        run: ls -l /build/bin/targets/rockchip/armv8/

      - name: 上传固件到 GitHub Actions Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: openwrt-firmware
          path: /build/bin/targets/rockchip/armv8/*img* # 只上传镜像文件
