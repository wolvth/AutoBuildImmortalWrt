name: Build OpenWrt Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Create output directory
        run: mkdir -p bin

      - name: Run OpenWrt Image Builder
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            openwrtorg/imagebuilder:rockchip-armv8-23.05.5 \
            make image PROFILE="friendlyarm_nanopi-r4s" PACKAGES="luci"

      - name: Upload OpenWrt Image
        uses: actions/upload-artifact@v3
        with:
          name: openwrt-images
          path: bin

