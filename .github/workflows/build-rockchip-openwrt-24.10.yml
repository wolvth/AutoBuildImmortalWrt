name: Build and Release OpenWrt Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create bin directory
        run: mkdir -p bin

      - name: Build OpenWrt Firmware
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            -v "${{ github.workspace }}/config:/home/build/openwrt/config" \
            openwrt/imagebuilder:rockchip-armv8-23.05.5 \
            make image PROFILE=friendlyarm_nanopi-r4s PACKAGES="luci"

      - name: Find firmware path in container
        id: find_firmware
        run: |
          FIRMWARE_PATH=$(find /home/build/openwrt/bin -name "*.img" -print -quit)
          echo "::set-output name=path::$FIRMWARE_PATH"
        shell: bash
        
      - name: List files in workspace
        run: ls -l

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v3
        with:
            name: openwrt-firmware
            path: ${{ steps.find_firmware.outputs.path }}
