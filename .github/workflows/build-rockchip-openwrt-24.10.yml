name: Build and Release OpenWrt Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up build environment
        run: mkdir -p ./bin

      - name: Build OpenWrt Firmware
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            -v "${{ github.workspace }}/config:/home/build/openwrt/config" \
            openwrt/imagebuilder:rockchip-armv8-23.05.5 \
            make image PROFILE=friendlyarm_nanopi-r4s PACKAGES="luci"


      - name: Check if firmware exists
        run: |
          ls -alh ./bin  # 打印 bin 目录内容，确保固件文件生成

      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: openwrt-firmware
          path: ./bin/* # 确保正确匹配生成的固件文件
          if-no-files-found: error # 如果没有找到文件，抛出错误，防止遗漏
          include-hidden-files: false

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: ./bin/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
