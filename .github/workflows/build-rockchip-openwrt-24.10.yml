name: Build OpenWrt Firmware

# Manually trigger the workflow
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v1

      - name: Build OpenWrt Firmware
        run: |
          docker run --rm -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
          openwrt/imagebuilder:x86-64-openwrt-23.05 \
          make image PROFILE="x86-64"
          done
          
      - name: Generate Firmware SHA-256
        run: |
          cp ${{ github.workspace }}/bin/targets/x86-64/amd64/*.img.gz ${{ github.workspace }}
          for file in *.img.gz; do
            sha256sum "$file" > "$file.sha256"
            sha256sum -c "$file.sha256"
          done
      

