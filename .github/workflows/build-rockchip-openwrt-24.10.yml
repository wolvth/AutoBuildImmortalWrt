name: Build OpenWrt Firmware

on:
  push:
    branches:
      - main
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up build environment
        run: mkdir -p ./bin

      - name: Build OpenWrt Firmware
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/bin:/home/build/openwrt/bin" \
            -v "${{ github.workspace }}/config:/home/build/openwrt/config" \
            -it openwrt/imagebuilder:rockchip-armv8-23.05.5 \
            make image PROFILE=friendlyarm_nanopi-r4s PACKAGES="luci"

      - name: Upload firmware
        uses: actions/upload-artifact@v3
        with:
          name: openwrt-firmware
          path: ./bin/
