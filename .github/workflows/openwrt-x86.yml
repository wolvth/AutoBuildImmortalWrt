# This is a basic workflow to help you get started with Actions

name: openwrt-x86

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
 
  build:
  
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      
      - uses: actions/checkout@v3
      - name: Load configuration from repo
        run: |
          find .
          cat openwrt.config
          cat openwrt.config >> $GITHUB_ENV
  
      - uses: izer-xyz/openwrt-imagebuilder-action@main
        with:
          image: x86-64
          profile: generic
          openwrt-version: 24.10.0-rc4
          packages: luci btop -ppp -ppp-mod-pppoe 
          #files: files
          rootfs-size: 300
      
      - name: List files in bin/targets
        run: ls -lhR ${{ github.workspace }}/bin/targets    
          
      - name: Extract manifest filename and path
        id: get-manifest
        run: |
          MANIFEST_FILE=$(find ${{ github.workspace }}/bin/targets -name "*.manifest" | head -n 1)
          MANIFEST_BASENAME=$(basename "$MANIFEST_FILE" .manifest)
          echo "manifest_file_name=$MANIFEST_BASENAME" >> $GITHUB_ENV
          echo "manifest_file_path=$(dirname "$MANIFEST_FILE")" >> $GITHUB_ENV

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.manifest_file_name }}
          path: ${{ env.manifest_file_path }}

